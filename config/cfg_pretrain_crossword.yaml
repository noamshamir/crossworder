# Crossword training config

defaults:
  - arch: trm_crossword
  - _self_

hydra:
  output_subdir: null

# Data path (built by dataset/build_crossword_dataset.py)
data_paths: ['data/crossword-1k']
data_paths_test: []

evaluators: []

# Hyperparams - Training
global_batch_size: 128

epochs: 50000
eval_interval: 5000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0

# Puzzle embeddings not used for crosswords
puzzle_emb_lr: 0
puzzle_emb_weight_decay: 0

seed: 0
min_eval_interval: 0

ema: True
ema_rate: 0.999
freeze_weights: False
